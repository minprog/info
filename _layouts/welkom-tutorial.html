---
layout: default
---

<div class="welkom-theme">
  <div class="welkom-content">
    <div class="tutorial-start-bar">
      <button id="tutorial-start-btn" class="tutorial-start-btn" type="button">
        ▶ Start tutorial
      </button>
    </div>

    {{ content }}
  </div>
</div>

<div id="tutorial-overlay" class="tutorial-overlay" role="dialog"
     aria-modal="true" aria-label="Tutorial presentation" hidden>
  <div class="tutorial-slide-container">
    <div id="tutorial-slide" class="tutorial-slide welkom-theme"></div>
  </div>
  <nav class="tutorial-nav">
    <button id="tut-prev" class="tut-nav-btn" type="button">← Prev</button>
    <span id="tut-progress" class="tut-progress" aria-live="polite"></span>
    <button id="tut-next" class="tut-nav-btn" type="button">Next →</button>
  </nav>
  <button id="tut-close" class="tut-close-btn" type="button">✕ Exit</button>
</div>

<script>
(function () {
  function buildSlides() {
    var content = document.querySelector('.welkom-content');
    var slides = [], current = null;
    Array.from(content.children).forEach(function (el) {
      if (el.id === 'markdown-toc' || el.classList.contains('tutorial-start-bar')) return;
      if (el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3') {
        current = document.createElement('div');
        current.appendChild(el.cloneNode(true));
        slides.push(current);
      } else if (current) {
        current.appendChild(el.cloneNode(true));
      }
    });
    return slides;
  }

  var slides = [], idx = 0;
  var overlay    = document.getElementById('tutorial-overlay');
  var slideEl    = document.getElementById('tutorial-slide');
  var prevBtn    = document.getElementById('tut-prev');
  var nextBtn    = document.getElementById('tut-next');
  var progressEl = document.getElementById('tut-progress');
  var closeBtn   = document.getElementById('tut-close');
  var startBtn   = document.getElementById('tutorial-start-btn');

  function showSlide(i) {
    idx = Math.max(0, Math.min(i, slides.length - 1));
    slideEl.innerHTML = '';
    slideEl.appendChild(slides[idx].cloneNode(true));
    progressEl.textContent = (idx + 1) + ' / ' + slides.length;
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === slides.length - 1);
    slideEl.parentElement.scrollTop = 0;
  }

  function openOverlay() {
    slides = buildSlides();
    if (!slides.length) return;
    showSlide(0);
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeOverlay() {
    overlay.hidden = true;
    document.body.style.overflow = '';
    startBtn.focus();
  }

  startBtn.addEventListener('click', openOverlay);
  closeBtn.addEventListener('click', closeOverlay);
  prevBtn.addEventListener('click', function () { showSlide(idx - 1); });
  nextBtn.addEventListener('click', function () { showSlide(idx + 1); });
  document.addEventListener('keydown', function (e) {
    if (overlay.hidden) return;
    if (e.key === 'Escape') closeOverlay();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showSlide(idx + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   showSlide(idx - 1);
  });
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeOverlay();
  });
})();
</script>
